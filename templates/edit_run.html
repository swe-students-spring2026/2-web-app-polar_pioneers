{% extends "base.html" %}
{% block title %}Edit Analysis — ResumeGo{% endblock %}

{% block content %}
<section class="page">
  <a href="/runs/{{ run.session_id }}" class="back-link">← Back to detail</a>
  <h1 class="page-title">Edit Analysis</h1>

  {% if error_msg %}
    <p class="form-error">{{ error_msg }}</p>
  {% endif %}

  <form method="POST" action="/runs/{{ run.session_id }}/edit" class="form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() if csrf_token is defined else '' }}">

    <div class="form-group">
      <label for="resume_file_name" class="form-label">Resume file</label>
      <input type="text" id="resume_file_name" class="form-input" value="{{ run.resume_file_name or '' }}" readonly>
    </div>

    <div class="form-group">
      <label for="cName" class="form-label">Company</label>
      <input type="text" id="cName" name="cName" class="form-input" value="{{ run.Company_name or '' }}">
    </div>

    <div class="form-group">
      <label for="job_description" class="form-label">Job description <span class="required">*</span></label>
      <textarea id="job_description" name="job_description" class="form-input form-textarea" rows="8" required>{{ run.job_description or '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="notes" class="form-label">Notes</label>
      <textarea id="notes" name="notes" class="form-input form-textarea" rows="4">{{ run.notes or '' }}</textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn--primary btn--lg btn--block">Save changes</button>
      <a href="/runs/{{ run.session_id }}" class="btn btn--secondary btn--lg btn--block">Cancel</a>
    </div>
  </form>
</section>
{% endblock %}
